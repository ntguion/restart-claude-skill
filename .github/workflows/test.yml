name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile restart-claude/restart.py tests/test_restart.py
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Dry run
        run: python restart-claude/restart.py --dry-run --no-message
